[build]
publish = "dist"
command = "pnpm run build"

  [build.environment]
  NODE_VERSION = "24.14.0"
  NODE_OPTIONS = "--max-old-space-size=10240"

[images]
remote_images = [ "https://ik.imagekit.io/.*", "https://res.cloudinary.com/gongeous/.*", "https://cdn.gongeo.us/.*" ]

[[edge_functions]]
function = "bot-block"
path = "/*"
excludedPath = "/robots.txt"

  [edge_functions.header]
  netlify-agent-category = "^(ai-agent|page-preview|crawler|tooling|other|none)(;.*)?$"

[[edge_functions]]
function = "root-redirect"
path = "/"

[[edge_functions]]
function = "redirects"
pattern = "^/(?:[a-z]{2}/)?(banner|item|outfit)(?:/.*)?$"

[[headers]]
for = "/.netlify/images*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  Netlify-CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800"
