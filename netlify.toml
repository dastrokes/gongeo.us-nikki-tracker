[build]
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.1"
  NODE_OPTIONS = "--max-old-space-size=8192"

# Headers: Netlify Image CDN caching
[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
    access-control-allow-origin = "*"

# Headers: Root HTML (no caching)
[[headers]]
  for = "/"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

# Headers: Static assets (1 week)
[[headers]]
  for = "/robots.txt"
  [headers.values]
    cache-control = "public, max-age=604800"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    cache-control = "public, max-age=604800"
	
[[headers]]
  for = "/apple-touch-icon*.png"
  [headers.values]
    cache-control = "public, max-age=604800"	

[[headers]]
  for = "/gongeous.js"
  [headers.values]
    cache-control = "public, max-age=604800"

# Headers: Nuxt static assets
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
