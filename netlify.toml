[build]
publish = "dist"
command = "npm run build"

  [build.environment]
  NODE_VERSION = "24.14.0"
  NODE_OPTIONS = "--max-old-space-size=10240"

[images]
remote_images = [ "https://ik.imagekit.io/.*", "https://res.cloudinary.com/gongeous/.*", "https://cdn.gongeo.us/.*" ]

[[edge_functions]]
function = "root-redirect"
path = "/"

[[edge_functions]]
function = "redirects"
pattern = "^/(?:[a-z]{2}/)?(banner|item|outfit)(?:/.*)?$"

[[headers]]
for = "/.netlify/images*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800, stale-if-error=604800"
  Netlify-CDN-Cache-Control = "public, durable, s-maxage=31536000, stale-while-revalidate=604800, stale-if-error=604800"
  Netlify-Cache-ID = "images"

[[headers]]
for = "/images/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800, stale-if-error=604800"
  Netlify-CDN-Cache-Control = "public, durable, s-maxage=31536000, stale-while-revalidate=604800, stale-if-error=604800"
  Netlify-Cache-ID = "images"

[[headers]]
for = "/catalog/*.*.json"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800"
  Netlify-CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800"

[[headers]]
for = "/catalog/index.json"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"
  CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400, stale-if-error=86400"
  Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400, stale-if-error=86400"
  Netlify-Cache-ID = "catalog"
