[build]
publish = "dist"
command = "npm run build"

  [build.environment]
  NODE_VERSION = "24.14.0"
  NODE_OPTIONS = "--max-old-space-size=10240"

[images]
remote_images = [ "https://ik.imagekit.io/.*", "https://res.cloudinary.com/gongeous/.*", "https://cdn.gongeo.us/.*" ]

[[redirects]]
from = "/banners/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/items/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/makeups/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/momo/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/outfits/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/de/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/es/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/fr/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/it/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/pt/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/ja/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/ko/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/zh/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[redirects]]
from = "/tw/:section/:id"
to = "/detail-shell.html"
status = 200
force = true

[[edge_functions]]
function = "bot-block"
path = "/*"
excludedPath = "/robots.txt"

  [edge_functions.header]
  netlify-agent-category = "^(ai-agent|page-preview|crawler|tooling|other|none)(;.*)?$"

[[edge_functions]]
function = "root-redirect"
path = "/"

[[edge_functions]]
function = "redirects"
pattern = "^/(?:[a-z]{2}/)?(banner|item|outfit)(?:/.*)?$"

[[headers]]
for = "/.netlify/images*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  Netlify-CDN-Cache-Control = "public, durable, s-maxage=31536000, stale-while-revalidate=604800, stale-if-error=604800"
  Netlify-Cache-ID = "images"

[[headers]]
for = "/images/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  Netlify-CDN-Cache-Control = "public, durable, s-maxage=31536000, stale-while-revalidate=604800, stale-if-error=604800"
  Netlify-Cache-ID = "images"

[[headers]]
for = "/catalog/index.json"

  [headers.values]
  Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
  Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400, stale-if-error=86400"

[[headers]]
for = "/catalog/*.*.json"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  Netlify-CDN-Cache-Control = "public, s-maxage=31536000, stale-while-revalidate=604800"
