[build]
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.1"

# Redirect to maintenance page
[[redirects]]
  from = "/*"
  to = "/maintenance"
  status = 302
  force = true

# Redirect API calls to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true

# Headers: Netlify Image CDN caching
[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
    access-control-allow-origin = "*"

# Headers: Public JavaScript files
[[headers]]
  for = "/js/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Headers: Root HTML (no caching)
[[headers]]
  for = "/"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

# Headers: Static assets (1 day)
[[headers]]
  for = "/robots.txt"
  [headers.values]
    cache-control = "public, max-age=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    cache-control = "public, max-age=86400"

# Headers: Nuxt static assets
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"
