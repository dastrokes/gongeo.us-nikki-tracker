[build]
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.20.0"
  NODE_OPTIONS = "--max-old-space-size=8192"

# ==============================
# Headers Configuration
# ==============================

# Netlify Image CDN
[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Public images
[[headers]]
  for = "/images/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Root HTML and all .html files (no caching)
[[headers]]
  for = "/"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    cache-control = "public, max-age=0, must-revalidate"

# Static text/config files
[[headers]]
  for = "/robots.txt"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Icons
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon*.png"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# JavaScript assets
[[headers]]
  for = "/gongeous.js"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Verification file
[[headers]]
  for = "/66641125bbad403d994c7d7af32e196b.txt"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

# Nuxt build assets
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"